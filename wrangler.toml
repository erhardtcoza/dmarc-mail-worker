name = "dmarc-mail-worker"
main = "src/index.ts"
compatibility_date = "2023-03-16"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dmarc-reports-open"         # Set this to your R2 bucket name. Required
preview_bucket_name = "dmarc-reports-open" # Set this to your preview R2 bucket name. Can be equal to bucket_name. Optional

[[d1_databases]]
binding = "DB"
database_name = "dmarc"
database_id = "a361bbea-4832-4bec-a391-c77d274fee4b"

[[analytics_engine_datasets]]
binding = "DMARC_ANALYTICS"
dataset = "dmarc_reports"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
